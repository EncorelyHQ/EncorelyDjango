{% extends "base.html" %}
{% load static %}

{% block title %}Mensajes — Encorely{% endblock %}

{% block content %}
<div class="chat-container" style="display: flex; height: 75vh; gap: 1.5rem; margin-top: 1rem;">
    <!-- Lista de Chats (Izquierda) -->
    <div class="chat-sidebar panel" style="width: 300px; overflow-y: auto; padding: 1rem;">
        <h3 style="margin-bottom: 1rem; color: var(--color-neon-blue);">Tus Matches</h3>
        <div id="chat-rooms-list" style="display: flex; flex-direction: column; gap: 0.5rem;">
            <!-- Rooms inyectadas dinámicamente -->
        </div>
    </div>

    <!-- Ventana de Chat (Derecha) -->
    <div class="chat-window panel" style="flex: 1; display: flex; flex-direction: column; padding: 0; overflow: hidden;">
        <!-- Cabecera de Chat -->
        <div id="chat-header" style="padding: 1rem 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 1rem; background: rgba(0,0,0,0.2);">
            <div id="chat-header-avatar" style="width: 40px; height: 40px; border-radius: 50%; background: var(--color-bg-dark);"></div>
            <h3 id="chat-header-name" style="margin: 0; color: var(--color-text-primary);">Selecciona un chat</h3>
        </div>

        <!-- Área de Mensajes -->
        <div id="chat-messages" style="flex: 1; padding: 1.5rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem;">
            <p style="text-align: center; color: var(--color-text-muted); margin-top: auto; margin-bottom: auto;">Inicia una conversación con tu match.</p>
        </div>

        <!-- Input Box -->
        <div style="padding: 1rem; border-top: 1px solid rgba(255,255,255,0.05); display: flex; gap: 0.5rem; background: rgba(0,0,0,0.2);">
            <input type="text" id="chat-input" class="form-control" placeholder="Escribe un mensaje..." style="margin-bottom: 0;" disabled>
            <button id="btn-send-message" class="btn btn-primary" disabled>Enviar</button>
        </div>
    </div>
</div>

<style>
/* Responsive chat fix */
@media (max-width: 768px) {
    .chat-container {
        flex-direction: column;
        height: 120vh;
    }
    .chat-sidebar {
        width: 100% !important;
        height: 300px;
    }
    .chat-window {
        height: 500px;
    }
}
</style>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/chat.js' %}"></script>
{% endblock %}
