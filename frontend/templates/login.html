{% extends "base.html" %}
{% load static %}

{% block title %}Login — Encorely{% endblock %}

{% block content %}
<div class="auth-wrapper" style="max-width: 400px; margin: 4rem auto;">
    <div class="panel text-center">
        <h2 style="margin-bottom: 0.5rem; color: var(--color-neon-blue);">Bienvenido de vuelta</h2>
        <p style="color: var(--color-text-secondary); margin-bottom: 2rem;">Ingresa a Encorely para continuar.</p>
        
        <form id="login-form">
            <div id="login-error" class="form-error" style="color: var(--color-neon-pink); display: none; margin-bottom: 1rem; padding: 0.5rem; background: rgba(255,0,127,0.1); border-radius: 4px;"></div>
            
            <div class="form-group" style="text-align: left;">
                <label for="username" class="form-label">Usuario</label>
                <input type="text" id="username" class="form-control" required placeholder="Tu nombre de usuario">
            </div>
            
            <div class="form-group" style="text-align: left;">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" id="password" class="form-control" required placeholder="••••••••">
            </div>
            
            <button type="submit" id="btn-login-submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                <span class="btn-text">Iniciar Sesión</span>
                <span class="btn-spinner" style="display: none;">Cargando...</span>
            </button>
        </form>
        
        <div style="margin-top: 1.5rem; font-size: 0.9rem;">
            <p style="color: var(--color-text-secondary);">¿No tienes cuenta? <a href="/register/">Regístrate aquí</a></p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/auth.js' %}"></script>
{% endblock %}
