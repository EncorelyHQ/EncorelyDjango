{% extends "base.html" %}
{% load static %}

{% block title %}Eventos — Encorely{% endblock %}

{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;">
    <h2 style="color: var(--color-neon-blue);">Eventos Recomendados</h2>
    
    <div style="display: flex; gap: 1rem; align-items: center;">
        <label for="city-filter" style="color: var(--color-text-secondary);">Ciudad:</label>
        <select id="city-filter" class="form-control" style="width: auto; margin-bottom: 0; background-color: var(--color-bg-dark);">
            <option value="all">Todas</option>
            <option value="medellin">Medellín</option>
            <option value="bogota">Bogotá</option>
            <option value="cali">Cali</option>
        </select>
    </div>
</div>

<div class="events-list" id="events-list" style="display: flex; flex-direction: column; gap: 1.5rem;">
    <!-- Tarjetas de eventos dinámicas -->
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/events.js' %}"></script>
{% endblock %}
