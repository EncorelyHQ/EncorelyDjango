{% extends "base.html" %}
{% load static %}

{% block title %}Perfil — Encorely{% endblock %}

{% block content %}
<div class="profile-container" style="max-width: 600px; margin: 2rem auto;">
    <div class="panel text-center">
        <div id="profile-avatar" style="width: 120px; height: 120px; border-radius: 50%; background: var(--color-bg-dark) url('https://i.pravatar.cc/150?u=me') center/cover; margin: 0 auto 1.5rem; border: 4px solid var(--color-neon-purple);"></div>
        
        <h2 id="profile-name" style="margin-bottom: 0.5rem; color: var(--color-text-primary);">Cargando...</h2>
        <p id="profile-username" style="color: var(--color-text-secondary); margin-bottom: 1.5rem;">@usuario</p>
        
        <div style="display: flex; justify-content: center; gap: 2rem; margin-bottom: 2rem;">
            <div>
                <h4 style="color: var(--color-neon-blue); font-size: 1.5rem;" id="profile-swipes">0</h4>
                <p style="color: var(--color-text-secondary); font-size: 0.9rem;">Swipes</p>
            </div>
            <div>
                <h4 style="color: var(--color-neon-green); font-size: 1.5rem;" id="profile-mood">-</h4>
                <p style="color: var(--color-text-secondary); font-size: 0.9rem;">Mood</p>
            </div>
            <div>
                <h4 style="color: var(--color-neon-pink); font-size: 1.5rem;" id="profile-city">-</h4>
                <p style="color: var(--color-text-secondary); font-size: 0.9rem;">Ciudad</p>
            </div>
        </div>

        <button class="btn btn-outline" style="width: 100%; border-color: var(--color-neon-pink); color: var(--color-neon-pink);" onclick="logout()">Cerrar Sesión</button>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/profile.js' %}"></script>
{% endblock %}
